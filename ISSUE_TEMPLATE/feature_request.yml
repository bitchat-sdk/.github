name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@bitchat/protocol-core (JS)"
        - "@bitchat/nostr (JS)"
        - "bitchat-protocol (Python)"
        - "bitchat-nostr (Python)"
        - "BitchatProtocol (Swift)"
        - "BitchatNostr (Swift)"
        - "BitLogger (Swift)"
        - "android-sdk (Android)"
        - "All packages / cross-language"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What can't you do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
