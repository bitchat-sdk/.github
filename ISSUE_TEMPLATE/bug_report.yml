name: Bug Report
description: Report a bug in one of the bitchat-sdk packages
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - "@bitchat/protocol-core (JS)"
        - "@bitchat/nostr (JS)"
        - "bitchat-protocol (Python)"
        - "bitchat-nostr (Python)"
        - "BitchatProtocol (Swift)"
        - "BitchatNostr (Swift)"
        - "BitLogger (Swift)"
        - "android-sdk (Android)"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: text
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Node 20 / macOS 14 / Python 3.12 / Android API 33"
